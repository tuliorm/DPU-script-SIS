[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    ".venv",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "UP",   # pyupgrade
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line-too-long (codigo legado tem mensagens longas em PT-BR)
    "B008",  # function-call-in-default-argument (FastAPI Depends/Query usa esse padrao)
]

[tool.ruff.lint.per-file-ignores]
"_migrar_pajs.py" = ["F401", "F841", "B"]  # script legado de migracao
"stop.py" = ["B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
