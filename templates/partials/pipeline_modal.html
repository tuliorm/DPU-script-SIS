<!-- Modal de log do docgen (gerar_docx.py / gerar_peticao.py) -->
<dialog id="docgen-modal" class="modal">
    <div class="modal-box w-11/12 max-w-4xl bg-base-300">
        <div class="flex items-center justify-between mb-3">
            <h3 class="font-bold text-lg" id="docgen-title">Gerar documento</h3>
            <div class="flex gap-2">
                <span id="docgen-status" class="badge badge-sm badge-ghost">aguardando</span>
                <form method="dialog">
                    <button class="btn btn-sm btn-ghost" id="docgen-close-btn">X</button>
                </form>
            </div>
        </div>
        <div id="docgen-log"
             class="bg-neutral text-neutral-content font-mono text-xs p-4 rounded-lg h-96 overflow-y-auto whitespace-pre-wrap">
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>fechar</button></form>
</dialog>
